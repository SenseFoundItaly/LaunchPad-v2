name: Daily cron trigger

on:
  schedule:
    # 06:17 UTC daily. Deliberately an odd, off-the-hour minute: GitHub heavily
    # throttles the popular top-of-hour slots (the old "0 8 * * *" was delayed
    # 2.5–5.5h, firing 10:30–13:33). An odd minute typically runs within minutes.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Run cron — housekeeping, then stream each due monitor
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          set -euo pipefail
          AUTH="Authorization: Bearer ${CRON_SECRET}"

          # 1. Housekeeping + collect DUE monitor IDs. Fast (a few SELECTs +
          #    watch-source scrapes), never runs monitor agents, so it can't
          #    time out the serverless function the way the old inline fan-out
          #    did. IDs come from our own API (mon_* ids), not user input.
          resp=$(curl -sf -H "$AUTH" "${SITE_URL}/api/cron" --max-time 120) \
            || { echo "cron housekeeping call failed"; exit 1; }
          echo "housekeeping: $(echo "$resp" | jq -c '.data | {swept_stale_runs, watch_sources_processed, watch_sources_failed}')"
          mapfile -t IDS < <(echo "$resp" | jq -r '.data.due_monitor_ids[]?')
          echo "due monitors: ${#IDS[@]}"

          # 2. Run each due monitor through the STREAMING endpoint. Consuming the
          #    SSE stream (curl -N) keeps the Netlify function alive for the full
          #    60-180s run — the path proven to complete as "Run now". One at a
          #    time so we never stack agent runs. Cap 50/run as a runaway guard;
          #    the rest resume next tick (last_run guard drops finished ones).
          n=0
          for id in "${IDS[@]}"; do
            n=$((n + 1))
            if [ "$n" -gt 50 ]; then echo "hit 50-monitor cap; remaining resume next tick"; break; fi
            echo "--- monitor $n/${#IDS[@]}: $id"
            curl -sN -H "$AUTH" "${SITE_URL}/api/cron/run-monitor?monitor_id=${id}" --max-time 240 \
              | tail -c 300 \
              || echo "monitor $id errored (continuing)"
            echo
          done

          # 3. Weekly pulse — the SERVER gates it on isWeeklyPulseDay(), so this
          #    is a no-op on non-pulse days. (Still runs inline; a follow-up
          #    should give heartbeats the same streaming treatment as monitors.)
          curl -sf -H "$AUTH" "${SITE_URL}/api/cron?run_pulse=1" --max-time 150 \
            | jq -c '.data | {heartbeats_ran, correlations_ran, pulse_remaining}' \
            || echo "pulse call errored (non-fatal)"
